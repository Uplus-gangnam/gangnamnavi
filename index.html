<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The강남 시연 Navigator</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#03050B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GN Navigator">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/icon-192.png" type="image/png">

<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --stage:#03050B;
    --bg-1:#060A16; --bg-2:#0B1226;
    --surface:rgba(255,255,255,0.045); --surface-strong:rgba(255,255,255,0.09);
    --line:rgba(255,255,255,0.11); --line-soft:rgba(255,255,255,0.06);
    --blue:#3E7BFA; --blue-bright:#7DAEFF; --blue-deep:#122058; --blue-mid:#1E3A8F;
    --ink:#F4F6FC; --ink-soft:#9CA5C1; --ink-faint:#5C6480;
    --good:#33D9A0; --mid:#FFC24E; --low:#525A73;
    --c-foreign:#FF9552; --c-biz:#5B9CFF; --c-family:#33D9A0; --c-age:#B08CFF;
    --radius-xl:32px; --radius-lg:22px; --radius-md:16px; --radius-sm:11px;
    --glow-blue:0 0 0 1px rgba(94,148,255,0.25), 0 18px 50px rgba(28,74,204,0.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--stage);color:var(--ink);
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;letter-spacing:-0.01em;
    word-break:keep-all;overflow-wrap:break-word;
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;
    background-image:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(62,123,250,0.20), transparent 60%);
  }
  ::selection{background:rgba(94,148,255,0.35);color:#fff;}
  :focus-visible{outline:2px solid var(--blue-bright);outline-offset:2px;border-radius:8px;}
  button{font-family:inherit;}
  img{display:block;}

  .stage-wrap{width:100%;height:100dvh;display:flex;align-items:center;justify-content:center;}
  .phone{
    position:relative;width:100%;max-width:430px;height:100dvh;overflow:hidden;
    background:linear-gradient(175deg,var(--bg-1) 0%, var(--bg-2) 100%);
    isolation:isolate;
  }
  @media (min-width:560px){
    .phone{
      height:min(100dvh - 48px, 900px);border-radius:44px;
      box-shadow:0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 90px rgba(62,123,250,0.18);
    }
  }
  .phone::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 480px 260px at 50% 0%, rgba(62,123,250,0.16), transparent 65%);
  }

  /* 하단바 탭 컨테이너 설정 */
  .tab-content { position:absolute; inset:0; z-index:1; }
  
  #screenHost{position:absolute;inset:0;overflow:hidden;}
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:linear-gradient(175deg,var(--bg-1) 0%, var(--bg-2) 100%);
    padding-bottom:80px; /* 하단 네비게이션 바 공간 확보 */
  }
  .screen::-webkit-scrollbar{display:none;}
  
  .anim-in-push{animation:inPush .38s cubic-bezier(.22,.68,.32,1) both;}
  .anim-out-push{animation:outPush .38s cubic-bezier(.22,.68,.32,1) both;}
  .anim-in-pop{animation:inPop .38s cubic-bezier(.22,.68,.32,1) both;}
  .anim-out-pop{animation:outPop .38s cubic-bezier(.22,.68,.32,1) both;}
  @keyframes inPush{from{transform:translateX(100%);}to{transform:translateX(0);}}
  @keyframes outPush{from{transform:translateX(0);}to{transform:translateX(-28%);opacity:.35;}}
  @keyframes inPop{from{transform:translateX(-28%);opacity:.5;}to{transform:translateX(0);opacity:1;}}
  @keyframes outPop{from{transform:translateX(0);}to{transform:translateX(100%);}}
  @media (prefers-reduced-motion: reduce){
    .anim-in-push,.anim-out-push,.anim-in-pop,.anim-out-pop{animation-duration:.01s;}
  }
  
  .screen.dragging{animation:none !important;}
  .screen.snapback{transition:transform .24s cubic-bezier(.22,.68,.32,1);}
  .swipehint{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:12px;font-size:11px;color:var(--ink-faint);font-weight:600;
  }
  .swipehint .arrows{color:var(--blue-bright);opacity:.7;letter-spacing:1px;}
  @media (hover:hover) and (pointer:fine){ .swipehint{display:none;} }

  .topbar{display:flex;align-items:center;gap:10px;padding:18px 20px 6px;flex:none;}
  .backbtn{
    width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer;flex:none;font-size:15px;
  }
  .backbtn:hover{background:var(--surface-strong);}
  .topbar .steplabel{font-size:11.5px;font-weight:800;color:var(--blue-bright);text-transform:uppercase;letter-spacing:.08em;}
  .topbar .skip{margin-left:auto;font-size:12.5px;color:var(--ink-faint);background:none;border:none;cursor:pointer;font-weight:700;padding:8px 4px;}
  .topbar .skip:hover{color:var(--ink-soft);}

  .progresstrack{height:3px;background:var(--line-soft);margin:0 20px;border-radius:99px;overflow:hidden;flex:none;}
  .progressfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-bright));border-radius:99px;transition:width .35s ease;}

  .content{flex:1;padding:22px 22px 18px;display:flex;flex-direction:column;}
  .eyebrow{font-size:11.5px;font-weight:800;color:var(--blue-bright);text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px;}
  .h1{font-size:26px;font-weight:800;letter-spacing:-0.02em;line-height:1.28;margin:0 0 8px;}
  .h1 .accent{background:linear-gradient(90deg,var(--blue-bright),#B7CCFF);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin:0 0 24px;font-weight:500;}

  .optgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .optgrid.single{grid-template-columns:1fr;}
  .optgrid.wrap3{grid-template-columns:repeat(3,1fr);}
  .optcard{
    background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-md);
    padding:16px 14px;cursor:pointer;transition:.15s;text-align:left;color:var(--ink);
    font-size:13.5px;font-weight:700;line-height:1.4;position:relative;min-height:64px;
    display:flex;align-items:center;
  }
  .optcard:hover{border-color:rgba(125,174,255,0.4);background:var(--surface-strong);}
  .optcard.selected{
    background:linear-gradient(135deg, rgba(62,123,250,0.22), rgba(62,123,250,0.06));
    border-color:var(--blue-bright);box-shadow:0 0 0 1px rgba(125,174,255,0.3), 0 8px 24px rgba(62,123,250,0.25);
  }
  .optcard .check{
    position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;
    background:var(--blue-bright);color:#04070F;display:none;align-items:center;justify-content:center;font-size:11px;font-weight:900;
  }
  .optcard.selected .check{display:flex;}

  .tagwrap{display:flex;flex-wrap:wrap;gap:8px;}
  .tagchip{
    padding:9px 15px;border-radius:999px;border:1.4px solid var(--line);background:var(--surface);
    font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;transition:.13s;
  }
  .tagchip.selected{background:rgba(62,123,250,0.22);border-color:var(--blue-bright);color:#fff;}

  .bottombar{flex:none;padding:16px 20px calc(20px + env(safe-area-inset-bottom));}
  .btn-primary{
    width:100%;padding:16px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--blue),#5C8DFF);color:#fff;font-size:15px;font-weight:800;
    box-shadow:0 10px 30px rgba(62,123,250,0.4);transition:.15s;letter-spacing:-0.01em;
  }
  .btn-primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
  .btn-primary:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 14px 34px rgba(62,123,250,0.5);}
  .btn-ghost{
    width:100%;padding:14px;border-radius:999px;background:transparent;border:1.4px solid var(--line);
    color:var(--ink-soft);font-size:13.5px;font-weight:700;cursor:pointer;margin-top:10px;
  }
  .btn-ghost:hover{border-color:var(--blue-bright);color:#fff;}

  /* ---------- Intro ---------- */
  .intro-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 28px;position:relative;}
  .intro-glow{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:280px;height:280px;
    background:radial-gradient(circle, rgba(62,123,250,0.35), transparent 70%);filter:blur(10px);pointer-events:none;}
  .intro-tag{position:relative;font-size:11px;font-weight:800;color:var(--blue-bright);letter-spacing:.16em;
    text-transform:uppercase;padding:7px 16px;border:1px solid rgba(125,174,255,0.35);border-radius:999px;
    margin-bottom:22px;background:rgba(62,123,250,0.08);}
  .intro-title{position:relative;font-size:34px;font-weight:900;letter-spacing:-0.03em;line-height:1.18;margin:0 0 14px;}
  .intro-title .accent{background:linear-gradient(90deg,var(--blue-bright) 10%,#fff 60%,var(--blue-bright) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .intro-desc{position:relative;font-size:13.5px;color:var(--ink-soft);line-height:1.7;font-weight:500;max-width:300px;margin:0 0 40px;}
  .intro-cta-wrap{position:relative;width:100%;}
  .intro-foot{margin-top:18px;font-size:11px;color:var(--ink-faint);font-weight:600;letter-spacing:.02em;}

  /* ---------- Results ---------- */
  .rcard{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:.15s;margin-bottom:11px;
  }
  .rcard:hover{border-color:rgba(125,174,255,0.4);background:var(--surface-strong);}
  .rcard.top{border-color:var(--blue-bright);box-shadow:var(--glow-blue);}
  .rcard .rank{width:24px;height:24px;border-radius:8px;background:var(--surface-strong);color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none;}
  .rcard.top .rank{background:var(--blue-bright);color:#04070F;}
  .rcard img.avatar{width:48px;height:48px;border-radius:14px;object-fit:cover;flex:none;}
  .rcard .info{flex:1;min-width:0;}
  .rcard .catpill{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:4px;}
  .rcard .pname{font-size:14px;font-weight:800;margin:0 0 2px;}
  .rcard .pneed{font-size:11px;color:var(--ink-faint);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rcard .rscore{font-size:15px;font-weight:800;color:var(--blue-bright);flex:none;}

  /* ---------- Detail ---------- */
  .dotstepper{display:flex;gap:6px;align-items:center;}
  .dotstepper .d{width:6px;height:6px;border-radius:50%;background:var(--line);}
  .dotstepper .d.active{background:var(--blue-bright);width:18px;border-radius:99px;}

  .detail-hero{display:flex;gap:14px;align-items:center;margin-bottom:22px;}
  .detail-hero img{width:56px;height:56px;border-radius:16px;object-fit:cover;border:2px solid rgba(125,174,255,0.4);}
  .detail-hero .catpill{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:5px;}
  .detail-hero .pname{font-size:16px;font-weight:800;margin:0;}

  .apptile{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
    padding:14px;display:flex;gap:12px;margin-bottom:10px;
  }
  .apptile .app-icon{width:44px;height:44px;border-radius:13px;flex:none;overflow:hidden;background:var(--surface-strong);border:1px solid var(--line);}
  .apptile .app-icon img{width:100%;height:100%;object-fit:cover;}
  .apptile .app-body{flex:1;min-width:0;}
  .apptile .app-name{font-size:13.5px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:6px;}
  .apptile .app-num{font-size:9.5px;font-weight:800;color:#04070F;background:var(--blue-bright);width:15px;height:15px;
    border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .apptile .app-feature{font-size:11.5px;color:var(--ink-soft);line-height:1.55;margin:0 0 7px;font-weight:500;}
  .apptile .app-demo{font-size:10.8px;color:var(--blue-bright);background:rgba(62,123,250,0.12);border-radius:7px;padding:5px 8px;font-weight:700;line-height:1.5;}

  .prodcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;margin-bottom:10px;}
  .prodcard .prow{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .prodcard .picon{width:28px;height:28px;border-radius:9px;background:var(--surface-strong);display:flex;align-items:center;justify-content:center;flex:none;}
  .prodcard .picon svg{width:14px;height:14px;}
  .prodcard .plabel{font-size:10px;color:var(--ink-faint);font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
  .prodcard .pvalue{font-size:13.5px;font-weight:800;}
  .prodcard .pdesc{font-size:11.3px;color:var(--ink-soft);line-height:1.55;font-weight:500;margin-left:38px;}

  .traitchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
  .traitchips span{font-size:11px;background:var(--surface);border:1px solid var(--line-soft);color:var(--ink-soft);padding:5px 11px;border-radius:999px;font-weight:600;}

  .scripttabs{display:flex;gap:6px;margin-bottom:12px;}
  .stab{flex:1;font-size:11.8px;padding:9px 6px;border-radius:11px;background:var(--surface);color:var(--ink-faint);
    cursor:pointer;border:1px solid var(--line);font-weight:700;text-align:center;}
  .stab.active{background:rgba(62,123,250,0.2);color:#fff;border-color:var(--blue-bright);}
  .scriptbox{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
    padding:16px;font-size:13px;line-height:1.85;font-weight:500;color:var(--ink);position:relative;min-height:120px;
  }
  .scriptbox mark{background:none;color:var(--blue-bright);font-weight:800;
    background-image:linear-gradient(rgba(62,123,250,0.25),rgba(62,123,250,0.25));
    background-repeat:no-repeat;background-size:100% 40%;background-position:0 88%;padding:0 1px;}
  .copybtn{
    margin-top:12px;width:100%;padding:11px;font-size:12.5px;background:var(--surface-strong);
    border:1px solid var(--line);border-radius:999px;cursor:pointer;color:var(--ink);font-weight:700;
  }
  .copybtn.done{background:rgba(51,217,160,0.18);border-color:var(--good);color:var(--good);}

  .sectionlabel{font-size:11px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px;}

  .emptynote{text-align:center;color:var(--ink-faint);font-size:12.5px;padding:40px 10px;font-weight:500;}

  /* ---------- 하단 탭 바 스타일 ---------- */
  .bottom-nav-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 76px;
    background: var(--bg-1);
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    height: 100%;
    cursor: pointer;
    color: var(--ink-faint);
    transition: 0.15s ease;
  }
  .nav-icon {
    font-size: 20px;
    margin-bottom: 4px;
    opacity: 0.6;
    transition: 0.15s ease;
  }
  .nav-text {
    font-size: 11px;
    font-weight: 600;
  }
  .nav-item.active {
    color: var(--blue-bright);
  }
  .nav-item.active .nav-icon {
    opacity: 1;
    transform: scale(1.1);
  }
  .nav-item.active .nav-text {
    font-weight: 800;
  }

  /* 개발중 안내 페이지 스타일 */
  .dev-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    text-align: center;
    padding: 40px 20px;
  }
  .dev-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }
  .dev-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--blue-bright);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .dev-subtitle {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 260px;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 0.7; }
  }
</style>
</head>
<body>
<div class="stage-wrap">
  <div class="phone">

    <!-- [TAB 1] 시연 가이드 구역 (기존 앱 구동 엔진 전체) -->
    <div id="tab-guide" class="tab-content" style="display: block;">
      <div id="screenHost"></div>
    </div>

    <!-- [TAB 2] The강남 시연 구역 (개발중 명시) -->
    <div id="tab-video" class="tab-content" style="display: none; height: 100%; background: linear-gradient(175deg,var(--bg-1) 0%, var(--bg-2) 100%);">
      <div class="dev-container">
        <div class="dev-icon">📺</div>
        <div class="dev-title">개발중</div>
        <div class="dev-subtitle">이 화면은 현재 고도화 개발 진행 중입니다.<br>조금만 기다려 주세요!</div>
      </div>
    </div>

    <!-- [TAB 3] 시연 제출하기 구역 (개발중 명시) -->
    <div id="tab-submit" class="tab-content" style="display: none; height: 100%; background: linear-gradient(175deg,var(--bg-1) 0%, var(--bg-2) 100%);">
      <div class="dev-container">
        <div class="dev-icon">📤</div>
        <div class="dev-title">개발중</div>
        <div class="dev-subtitle">새로운 참여형 시연 제출 기능이<br>준비 중입니다.</div>
      </div>
    </div>

    <!-- 하단 고정 내비게이션 바 -->
    <div class="bottom-nav-bar">
      <button class="nav-item active" onclick="changeTab('tab-guide', this)">
        <span class="nav-icon">📖</span>
        <span class="nav-text">시연 가이드</span>
      </button>
      <button class="nav-item" onclick="changeTab('tab-video', this)">
        <span class="nav-icon">📺</span>
        <span class="nav-text">The강남 시연</span>
      </button>
      <button class="nav-item" onclick="changeTab('tab-submit', this)">
        <span class="nav-icon">📤</span>
        <span class="nav-text">시연 제출하기</span>
      </button>
    </div>

  </div>
</div>

<script>
/** 탭 전환 제어 함수 */
function changeTab(tabId, targetBtn) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.style.display = 'none';
  });
  document.getElementById(tabId).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.remove('active');
  });
  targetBtn.classList.add('active');
}
