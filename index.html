<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The강남 시연 Navigator</title>

<!-- 1. PWA 설정 -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#EC008C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  /* ========================================== */
  /* 기존 원본 CSS 100% 유지 (절대 수정하지 않음) */
  /* ========================================== */
  :root{
    --primary:#EC008C; --primary-600:#C4006F; --primary-700:#9E0059;
    --primary-100:#FDE3F1; --primary-50:#FFF4FA;
    --ink:#18181F; --ink-soft:#63637A; --ink-faint:#9A99AE;
    --line:#EEEBF3; --line-soft:#F5F3F9; --bg:#FCFBFE; --surface:#FFFFFF;
    --good:#12B57A; --mid:#F5A700; --low:#B9B7C9;
    --c-foreign:#FF7A32; --c-foreign-bg:#FFF0E4;
    --c-biz:#3F7DFF;     --c-biz-bg:#EBF2FF;
    --c-family:#12B57A;  --c-family-bg:#E6FAF1;
    --c-age:#8C4CF0;     --c-age-bg:#F3EBFE;
    --radius-lg:24px; --radius-md:16px; --radius-sm:12px;
    --shadow-card:0 2px 10px rgba(30,20,50,0.05), 0 1px 2px rgba(30,20,50,0.04);
    --shadow-pop:0 12px 32px rgba(236,0,140,0.14);
    --shadow-hero:0 18px 46px rgba(30,20,50,0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;letter-spacing:-0.01em;
  }
  ::selection{background:var(--primary-100);color:var(--primary-700);}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px;}
  button{font-family:inherit;}
  img{display:block;}
  .shell{max-width:1180px;margin:0 auto;padding:16px 16px 100px;} /* 하단 탭 여백 증가 */

  /* ---------- App bar ---------- */
  .appbar{display:flex;align-items:center;gap:14px;padding:14px 4px 20px;}
  .mark{width:42px;height:42px;border-radius:13px;flex:none;
    background:linear-gradient(135deg,var(--primary) 0%,#FF4FB2 100%);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(236,0,140,0.28);}
  .mark span{color:#fff;font-weight:800;font-size:14px;letter-spacing:-0.03em;}
  .appbar .titles h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-0.02em;}
  .appbar .titles p{margin:2px 0 0;font-size:12.5px;color:var(--ink-faint);font-weight:500;}
  .appbar .storechip{margin-left:auto;font-size:11px;font-weight:700;color:var(--primary-700);
    background:var(--primary-50);border:1px solid var(--primary-100);padding:6px 12px;border-radius:999px;white-space:nowrap;}

  /* ---------- Layout ---------- */
  .layout{display:grid;grid-template-columns:322px 1fr;gap:18px;align-items:start;}
  @media (max-width:920px){ .layout{grid-template-columns:1fr;} }

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card);position:sticky;top:14px;overflow:hidden;}
  @media (max-width:920px){ .panel{position:static;} }
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;
    border-bottom:1px solid var(--line-soft);cursor:pointer;}
  .panel-head .h-left{display:flex;align-items:center;gap:9px;}
  .panel-head h2{font-size:15px;margin:0;font-weight:800;}
  .activebadge{font-size:11px;font-weight:800;color:#fff;background:var(--primary);
    min-width:20px;height:20px;padding:0 6px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .panel-head .h-right{display:flex;align-items:center;gap:14px;}
  .reset{font-size:12px;color:var(--ink-faint);background:none;border:none;cursor:pointer;font-weight:700;}
  .reset:hover{color:var(--primary-600);}
  .collapse-ico{width:22px;height:22px;border-radius:8px;background:var(--line-soft);
    display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-soft);transition:transform .2s;}
  .panel.collapsed .collapse-ico{transform:rotate(-90deg);}
  .panel-body{padding:16px 20px 20px;}
  .panel.collapsed .panel-body{display:none;}
  @media (max-width:920px){ .panel-body{display:block !important;} }

  .group{margin-bottom:18px;}
  .group:last-child{margin-bottom:4px;}
  .group .label{font-size:11.5px;font-weight:800;color:var(--ink-soft);margin-bottom:9px;
    display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.03em;}
  .group .label .bonus{font-size:9.5px;background:var(--primary-50);color:var(--primary-600);
    padding:2px 7px;border-radius:6px;font-weight:800;text-transform:none;letter-spacing:0;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{padding:8px 14px;min-height:36px;display:flex;align-items:center;border-radius:999px;
    border:1.4px solid var(--line);background:var(--surface);font-size:13px;font-weight:600;
    cursor:pointer;color:var(--ink-soft);transition:.13s ease;user-select:none;}
  .chip:hover{border-color:var(--primary);color:var(--primary-700);background:var(--primary-50);}
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700;
    box-shadow:0 4px 12px rgba(236,0,140,0.25);}
  .chip.tagchip{font-size:12px;padding:6px 12px;min-height:32px;}

  .summary-bar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px;flex-wrap:wrap;gap:8px;}
  .summary-bar .count{font-size:14.5px;color:var(--ink-soft);font-weight:600;}
  .summary-bar .count b{color:var(--primary-600);font-weight:800;}
  .sortnote{font-size:12px;color:var(--ink-faint);font-weight:500;}

  .cards{display:flex;flex-direction:column;gap:12px;}
  .empty{background:var(--surface);border:1.5px dashed var(--line);border-radius:var(--radius-lg);
    padding:56px 20px;text-align:center;color:var(--ink-faint);font-size:13.5px;font-weight:500;}

  /* ---------- List Card ---------- */
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    overflow:hidden;box-shadow:var(--shadow-card);cursor:pointer;transition:.15s;}
  .pcard:hover{border-color:var(--primary);transform:translateY(-1px);box-shadow:var(--shadow-pop);}
  .pcard.top{border-color:var(--primary);}
  .pcard-head{display:flex;gap:14px;padding:14px 18px;align-items:center;}
  .rankbadge{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:11.5px;color:#fff;flex:none;}
  .avatar{width:54px;height:54px;border-radius:16px;flex:none;object-fit:cover;
    box-shadow:0 3px 10px rgba(30,20,50,0.12);}
  .pcard-info{flex:1;min-width:0;}
  .pcard-info .catline{display:flex;gap:7px;align-items:center;margin-bottom:5px;}
  .catpill{font-size:10.5px;font-weight:800;letter-spacing:.01em;padding:3px 9px;border-radius:999px;}
  .pname{font-size:15.5px;font-weight:800;margin:0;letter-spacing:-0.01em;}
  .pneed{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.5;font-weight:500;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ring-wrap{position:relative;width:52px;height:52px;flex:none;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-track{fill:none;stroke:var(--line);stroke-width:5;}
  .ring-fill{fill:none;stroke-width:5;stroke-linecap:round;}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .arrow-ico{font-size:14px;color:var(--ink-faint);flex:none;}
  .tagsrow{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 14px;}
  .mtag{font-size:11px;font-weight:600;background:var(--line-soft);color:var(--ink-soft);padding:3px 10px;border-radius:999px;}
  .mtag.hit{background:var(--primary-100);color:var(--primary-700);font-weight:700;}

  /* ---------- Detail Page ---------- */
  #detailView{display:none;}
  .backbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .backbtn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .backbtn:hover{border-color:var(--primary);color:var(--primary-700);}

  .hero{background:linear-gradient(135deg,#FFFFFF 0%,var(--primary-50) 100%);
    border:1px solid var(--primary-100);border-radius:28px;padding:28px;display:flex;gap:24px;
    align-items:center;box-shadow:var(--shadow-hero);margin-bottom:22px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;
    background:radial-gradient(circle,rgba(236,0,140,0.10),transparent 70%);}
  .hero-photo{width:132px;height:132px;border-radius:28px;object-fit:cover;flex:none;
    box-shadow:0 14px 30px rgba(30,20,50,0.18);border:4px solid #fff;position:relative;z-index:1;}
  .hero-info{flex:1;min-width:0;position:relative;z-index:1;}
  .hero-info .catpill{margin-bottom:8px;display:inline-block;}
  .hero-info h2{font-size:24px;margin:0 0 8px;font-weight:800;letter-spacing:-0.02em;}
  .hero-info .quote{font-size:14.5px;color:var(--ink-soft);font-weight:500;line-height:1.6;margin:0;}
  .hero-score{flex:none;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1;}
  .hero-score .ring-wrap{width:84px;height:84px;}
  .hero-score .ring-wrap svg{width:84px;height:84px;}
  .hero-score .ring-label{font-size:20px;}
  .hero-score .ring-cap{font-size:10.5px;color:var(--ink-faint);font-weight:700;}
  @media (max-width:680px){ .hero{flex-wrap:wrap;padding:22px;} .hero-score{width:100%;flex-direction:row;justify-content:center;gap:10px;} }

  .sectionblock{margin-bottom:26px;}
  .sectionblock h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);
    font-weight:800;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .sectionblock h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);}

  /* app tiles */
  .appgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media (max-width:680px){ .appgrid{grid-template-columns:1fr;} }
  .apptile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
    padding:16px;display:flex;gap:13px;box-shadow:var(--shadow-card);}
  .app-icon{width:48px;height:48px;border-radius:14px;flex:none;overflow:hidden;
    background:var(--line-soft);border:1px solid var(--line);}
  .app-icon img{width:100%;height:100%;object-fit:cover;display:block;}
  .app-icon svg{width:23px;height:23px;}
  .app-num{font-size:10px;font-weight:800;color:#fff;background:var(--ink);width:16px;height:16px;
    border-radius:5px;display:inline-flex;align-items:center;justify-content:center;margin-right:6px;}
  .app-body{flex:1;min-width:0;}
  .app-name{font-size:14px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;}
  .app-feature{font-size:12.5px;color:var(--ink-soft);line-height:1.55;margin:0 0 8px;font-weight:500;}
  .app-demo{font-size:11.5px;color:var(--primary-700);background:var(--primary-50);
    border-radius:8px;padding:5px 9px;font-weight:700;line-height:1.5;}
  .app-demo .lbl{color:var(--primary);font-weight:800;}

  /* U+ product cards */
  .prodgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media (max-width:820px){ .prodgrid{grid-template-columns:repeat(2,1fr);} }
  .prodcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
    padding:15px;box-shadow:var(--shadow-card);}
  .prodcard .picon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .prodcard .picon svg{width:17px;height:17px;}
  .prodcard .plabel{font-size:10.5px;color:var(--ink-faint);font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
  .prodcard .pvalue{font-size:13.5px;font-weight:800;margin-bottom:6px;}
  .prodcard .pdesc{font-size:11.5px;color:var(--ink-soft);line-height:1.5;font-weight:500;}

  .traitchips{display:flex;flex-wrap:wrap;gap:7px;}
  .traitchips span{font-size:12px;background:var(--line-soft);color:var(--ink-soft);padding:6px 12px;border-radius:999px;font-weight:600;}

  .scripttabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .stab{font-size:12.5px;padding:8px 14px;border-radius:999px;background:var(--line-soft);color:var(--ink-soft);
    cursor:pointer;border:none;font-weight:700;}
  .stab.active{background:var(--primary);color:#fff;box-shadow:0 4px 10px rgba(236,0,140,0.22);}
  .scriptbox{background:var(--primary-50);border:1px solid var(--primary-100);border-radius:var(--radius-md);
    padding:18px 20px;font-size:13.5px;line-height:1.85;position:relative;min-height:80px;font-weight:500;color:var(--ink);}
  .scriptbox mark{background:none;color:var(--primary-700);font-weight:800;
    background-image:linear-gradient(var(--primary-100),var(--primary-100));
    background-repeat:no-repeat;background-size:100% 42%;background-position:0 88%;padding:0 1px;}
  .copybtn{position:absolute;top:14px;right:14px;font-size:11.5px;background:#fff;border:1px solid var(--primary-100);
    border-radius:8px;padding:6px 11px;cursor:pointer;color:var(--primary-600);font-weight:700;}
  .copybtn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
  .copybtn.done{background:var(--good);color:#fff;border-color:var(--good);}

  @media (max-width:560px){
    .shell{padding:12px 12px 100px;}
    .appbar{padding:10px 2px 16px;}
    .appbar .titles h1{font-size:17px;}
    .appbar .storechip{display:none;}
    .hero{padding:18px;gap:14px;}
    .hero-photo{width:88px;height:88px;border-radius:20px;}
    .hero-info h2{font-size:19px;}
  }

  /* ========================================================= */
  /* 추가된 하단 탭 바 및 개발중 화면 스타일 (기존 디자인 무간섭) */
  /* ========================================================= */
  .bottom-nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: var(--surface);
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 9999;
    box-shadow: 0 -4px 16px rgba(30,20,50,0.06);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    height: 100%;
    cursor: pointer;
    color: var(--ink-soft);
    transition: 0.15s ease;
    padding: 4px 0;
  }
  .nav-icon {
    font-size: 20px;
    margin-bottom: 3px;
    opacity: 0.7;
    transition: 0.15s ease;
  }
  .nav-text {
    font-size: 11px;
    font-weight: 600;
  }
  .nav-item.active {
    color: var(--primary);
  }
  .nav-item.active .nav-icon {
    opacity: 1;
    transform: scale(1.1);
  }
  .nav-item.active .nav-text {
    font-weight: 800;
  }

  .dev-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 60vh;
    text-align: center;
    padding: 40px 20px;
  }
  .dev-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }
  .dev-title {
    font-size: 32px;
    font-weight: 900;
    color: var(--primary);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .dev-subtitle {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- [TAB 1] 시연 가이드 구역 (원본 구조 100% 유지) -->
  <div id="tab-guide" class="tab-content" style="display: block;">
    <header class="appbar">
      <div class="mark"><span>TG</span></div>
      <div class="titles">
        <h1>The강남 시연 Navigator</h1>
        <p>Seg. 조건을 선택하면 어울리는 페르소나·추천 앱·U+ 상품·Script를 매칭합니다</p>
      </div>
      <div class="storechip">폴더블8 통합 GTM</div>
    </header>

    <!-- ===== 목록 뷰 ===== -->
    <div id="listView">
      <div class="layout">
        <aside class="panel" id="panel">
          <div class="panel-head" id="panelToggle">
            <div class="h-left"><h2>Seg. 조건 선택</h2><span class="activebadge" id="activeBadge" style="display:none;">0</span></div>
            <div class="h-right"><button class="reset" id="resetBtn">초기화</button><div class="collapse-ico">▾</div></div>
          </div>
          <div class="panel-body"><div id="filterGroups"></div></div>
        </aside>
        <main>
          <div class="summary-bar">
            <div class="count">매칭 결과 <b id="resultCount">0</b>건</div>
            <div class="sortnote" id="sortNote"></div>
          </div>
          <div class="cards" id="cardList"></div>
        </main>
      </div>
    </div>

    <!-- ===== 상세 뷰 (랜딩페이지 형) ===== -->
    <div id="detailView">
      <div class="backbar">
        <button class="backbtn" id="backBtn">← 목록으로</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- [TAB 2] The강남 시연 구역 (개발중 명시) -->
  <div id="tab-video" class="tab-content" style="display: none;">
    <div class="dev-container">
      <div class="dev-icon">📺</div>
      <div class="dev-title">개발중</div>
      <div class="dev-subtitle">이 화면은 현재 고도화 개발 진행 중입니다.<br>조금만 기다려 주세요!</div>
    </div>
  </div>

  <!-- [TAB 3] 시연 제출하기 구역 (개발중 명시) -->
  <div id="tab-submit" class="tab-content" style="display: none;">
    <div class="dev-container">
      <div class="dev-icon">📤</div>
      <div class="dev-title">개발중</div>
      <div class="dev-subtitle">새로운 참여형 시연 제출 기능이<br>준비 중입니다.</div>
    </div>
  </div>

</div>

<!-- 하단 고정 내비게이션 바 -->
<div class="bottom-nav-bar">
  <button class="nav-item active" onclick="changeAppTab('tab-guide', this)">
    <span class="nav-icon">📖</span>
    <span class="nav-text">시연 가이드</span>
  </button>
  <button class="nav-item" onclick="changeAppTab('tab-video', this)">
    <span class="nav-icon">📺</span>
    <span class="nav-text">The강남 시연</span>
  </button>
  <button class="nav-item" onclick="changeAppTab('tab-submit', this)">
    <span class="nav-icon">📤</span>
    <span class="nav-text">시연 제출하기</span>
  </button>
</div>

<!-- 앱 탭 전환 제어 스크립트 -->
<script>
  function changeAppTab(tabId, targetBtn) {
    document.querySelectorAll('.tab-content').forEach(tab => {
      tab.style.display = 'none';
    });
    
    document.getElementById(tabId).style.display = 'block';
    
    document.querySelectorAll('.bottom-nav-bar .nav-item').forEach(btn => {
      btn.classList.remove('active');
    });
    targetBtn.classList.add('active');
  }

        if (step === 'tags') {
          let s = new Set();
          personas.forEach(p => (p.tags || []).forEach(t => s.add(t)));
          options = Array.from(s);
        } else {
          let s = new Set();
          personas.forEach(p => {
            let v = p[step];
            if (Array.isArray(v)) v.forEach(item => s.add(item));
            else if (v) s.add(v);
          });
          options = Array.from(s);
        }

        const groupDiv = document.createElement('div');
        groupDiv.className = 'group';
        groupDiv.innerHTML = `
          <div class="label">${CONFIG.stepLabels[step]} ${isMulti ? '<span class="bonus">중복선택</span>' : ''}</div>
          <div class="chips" id="chips-${step}"></div>
        `;
        container.appendChild(groupDiv);

        const chipsDiv = groupDiv.querySelector(`#chips-${step}`);
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = `chip ${step === 'tags' ? 'tagchip' : ''}`;
          btn.innerText = opt;
          btn.onclick = () => handleSelect(step, opt, isMulti, btn);
          chipsDiv.appendChild(btn);
        });
      });
    }

    function handleSelect(step, val, isMulti, el) {
      if (!isMulti) {
        state.selections[step] = state.selections[step] === val ? null : val;
        el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if (state.selections[step]) el.classList.add('active');
      } else {
        let arr = state.selections[step];
        let idx = arr.indexOf(val);
        if (idx > -1) {
          arr.splice(idx, 1);
          el.classList.remove('active');
        } else {
          arr.push(val);
          el.classList.add('active');
        }
      }
      updateResults();
    }

    document.getElementById('resetBtn')?.addEventListener('click', () => {
      state.selections = { nationality: null, age: [], residence: [], occupation: [], family: [], tags: [] };
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      updateResults();
    });

    document.getElementById('panelToggle')?.addEventListener('click', () => {
      document.getElementById('panel').classList.toggle('collapsed');
    });

    document.getElementById('backBtn')?.addEventListener('click', () => {
      document.getElementById('detailView').style.display = 'none';
      document.getElementById('listView').style.display = 'block';
    });

    function calculateMatches() {
      let isAnySelected = false;
      CONFIG.steps.forEach(s => {
        if (state.selections[s] && state.selections[s].length > 0) isAnySelected = true;
      });

      if (!isAnySelected) {
        return personas.map(p => ({ persona: p, score: 0, matchRate: 0 }));
      }

      let rated = personas.map(p => {
        let score = 0;
        CONFIG.steps.forEach(step => {
          let sel = state.selections[step];
          if (!sel || (Array.isArray(sel) && sel.length === 0)) return;
          
          if (step === 'tags') {
            let matches = p.tags.filter(t => sel.includes(t)).length;
            score += matches * 15;
          } else {
            let pVal = p[step];
            if (Array.isArray(pVal)) {
              let intersect = pVal.filter(x => Array.isArray(sel) ? sel.includes(x) : sel === x);
              if(intersect.length > 0) score += 20;
            } else {
              if (Array.isArray(sel)) {
                if (sel.includes(pVal)) score += 20;
              } else {
                if (sel === pVal) score += 20;
              }
            }
          }
        });
        return { persona: p, score: score };
      });

      rated.sort((a, b) => b.score - a.score);
      let max = rated[0] ? rated[0].score : 1;
      if(max === 0) max = 1;
      
      return rated.map(r => {
        r.matchRate = Math.round((r.score / max) * 100);
        return r;
      });
    }

    function getCatColors(cat) {
      if (cat.includes('외국인')) return { bg: 'var(--c-foreign-bg)', text: 'var(--c-foreign)' };
      if (cat.includes('사업자')) return { bg: 'var(--c-biz-bg)', text: 'var(--c-biz)' };
      if (cat.includes('가족')) return { bg: 'var(--c-family-bg)', text: 'var(--c-family)' };
      return { bg: 'var(--c-age-bg)', text: 'var(--c-age)' };
    }

    function updateResults() {
      let isAnySelected = false;
      let badgeCount = 0;
      CONFIG.steps.forEach(s => {
        let sel = state.selections[s];
        if (sel && sel.length > 0) {
          isAnySelected = true;
          badgeCount += Array.isArray(sel) ? sel.length : 1;
        }
      });

      const badge = document.getElementById('activeBadge');
      if(badge) {
        badge.style.display = badgeCount > 0 ? 'flex' : 'none';
        badge.innerText = badgeCount;
      }

      let scored = calculateMatches();
      let matchedCount = scored.filter(r => r.score > 0).length;
      
      const countEl = document.getElementById('resultCount');
      if(countEl) countEl.innerText = isAnySelected ? matchedCount : personas.length;

      const noteEl = document.getElementById('sortNote');
      if(noteEl) noteEl.innerText = isAnySelected ? '적합도순 정렬' : '기본 정렬';

      const listEl = document.getElementById('cardList');
      if(!listEl) return;
      listEl.innerHTML = '';

      let displayList = isAnySelected ? scored.filter(r => r.score > 0) : scored;

      if (displayList.length === 0) {
        listEl.innerHTML = `<div class="empty">선택한 조건에 맞는 결과가 없습니다.</div>`;
        return;
      }

      displayList.forEach((item, idx) => {
        let p = item.persona;
        let isTop = isAnySelected && idx === 0 ? 'top' : '';
        let colorObj = getCatColors(p.cat);
        
        let ringHtml = isAnySelected ? `
          <div class="ring-wrap">
            <svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15.5"></circle><circle class="ring-fill" cx="18" cy="18" r="15.5" stroke="var(--blue-bright)" stroke-dasharray="${item.matchRate * 0.97} 100"></circle></svg>
            <div class="ring-label" style="color:var(--blue-bright)">${item.matchRate}%</div>
          </div>
        ` : '';

        let hitTagsHtml = '';
        if (isAnySelected && state.selections.tags.length > 0) {
          hitTagsHtml = `<div class="tagsrow">` + p.tags.map(t => {
            let hit = state.selections.tags.includes(t) ? 'hit' : '';
            return `<span class="mtag ${hit}">#${t}</span>`;
          }).join('') + `</div>`;
        }

        const card = document.createElement('div');
        card.className = `pcard ${isTop}`;
        card.onclick = () => openDetail(p.no, item.matchRate, isAnySelected);
        card.innerHTML = `
          <div class="pcard-head">
            ${isAnySelected ? `<div class="rankbadge" style="background:${idx===0?'var(--blue-bright)':'var(--surface-strong)'}; color:${idx===0?'#04070F':'var(--ink-soft)'}">${idx + 1}</div>` : ''}
            <img src="${p.photo}" class="avatar" data-photo="${p.photo}">
            <div class="pcard-info">
              <div class="catline"><span class="catpill" style="background:${colorObj.bg}; color:${colorObj.text}">${p.cat} · ${p.sub}</span></div>
              <h3 class="pname">${p.persona}</h3>
              <p class="pneed">${p.need}</p>
            </div>
            ${ringHtml}
            <div class="arrow-ico">❯</div>
          </div>
          ${hitTagsHtml}
        `;
        listEl.appendChild(card);
      });
      injectLazyPhotos();
    }

    window.activeScriptText = "";
    window.setScriptTab = function(tabIdx, no) {
      const p = personas.find(x => x.no === no);
      if(!p) return;
      document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
      const target = document.getElementById(`sTab${tabIdx}`);
      if(target) target.classList.add('active');

      let text = "";
      if (tabIdx === 1) text = p.empathy;
      else if (tabIdx === 2) text = p.intro;
      else text = p.closing;

      window.activeScriptText = text;

      const box = document.getElementById('scriptContent');
      if (box) {
        box.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<mark>$1</mark>');
      }
      const btn = document.getElementById('copyBtn');
      if(btn) {
        btn.innerText = "화법 스크립트 복사하기";
        btn.className = "copybtn";
      }
    };

    window.copyScriptData = function() {
      let cleanText = window.activeScriptText.replace(/\*\*/g, '');
      navigator.clipboard.writeText(cleanText).then(() => {
        const btn = document.getElementById('copyBtn');
        if (btn) {
          btn.innerText = "✓ 복사 완료!";
          btn.className = "copybtn done";
        }
      }).catch(err => {
        console.error("클립보드 복사 에러", err);
      });
    };

    function openDetail(no, rate, isAnySelected) {
      const p = personas.find(x => x.no === no);
      if(!p) return;

      document.getElementById('listView').style.display = 'none';
      const detail = document.getElementById('detailView');
      detail.style.display = 'block';
      window.scrollTo(0,0);

      let colorObj = getCatColors(p.cat);
      
      let rateHtml = isAnySelected ? `
        <div class="hero-score">
          <div class="ring-wrap"><svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15.5"></circle><circle class="ring-fill" cx="18" cy="18" r="15.5" stroke="var(--blue-bright)" stroke-dasharray="${rate * 0.97} 100"></circle></svg><div class="ring-label" style="color:var(--blue-bright)">${rate}%</div></div>
          <div class="ring-cap">매칭 적합도</div>
        </div>
      ` : '';

      let html = `
        <div class="hero">
          <img src="${p.photo}" class="hero-photo" data-photo="${p.photo}">
          <div class="hero-info">
            <span class="catpill" style="background:${colorObj.bg}; color:${colorObj.text}">${p.cat} · ${p.sub}</span>
            <h2>${p.persona}</h2>
            <p class="quote">"${p.need}"</p>
          </div>
          ${rateHtml}
        </div>

        <div class="sectionblock">
          <h3><div class="dot"></div>특징 및 니즈</h3>
          <div class="traitchips">
            <span>${p.nationality}</span><span>${p.occupation[0]}</span><span>${p.residence[0]}</span>
            ${p.traits.map(t => `<span>${t}</span>`).join('')}
          </div>
        </div>

        <div class="sectionblock">
          <h3><div class="dot"></div>체험 추천 스마트 앱 4선</h3>
          <div class="appgrid">
            ${p.apps.map((app, i) => `
              <div class="apptile">
                <div class="app-icon"><img src="${app.icon}" data-photo="${app.icon}"></div>
                <div class="app-body">
                  <h4 class="app-name"><span class="app-num">${i+1}</span>${app.name}</h4>
                  <p class="app-feature">${app.feature}</p>
                  <div class="app-demo"><span class="lbl">시연:</span> ${app.demo}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="sectionblock">
          <h3><div class="dot"></div>U+ 매칭 추천 상품 패키지</h3>
          <div class="prodgrid">
            <div class="prodcard">
              <div class="picon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.79 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
              <div class="plabel">단말기</div>
              <div class="pvalue">${p.device}</div>
              <div class="pdesc">${p.deviceDesc}</div>
            </div>
            <div class="prodcard">
              <div class="picon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
              <div class="plabel">요금제 패키지</div>
              <div class="pvalue">${p.plan}</div>
              <div class="pdesc">${p.planDesc}</div>
            </div>
            <div class="prodcard">
              <div class="picon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
              <div class="plabel">추가 서비스</div>
              <div class="pvalue">${p.service}</div>
              <div class="pdesc">${p.serviceDesc}</div>
            </div>
            <div class="prodcard">
              <div class="picon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
              <div class="plabel">제휴 혜택</div>
              <div class="pvalue">${p.membership}</div>
              <div class="pdesc">${p.membershipDesc}</div>
            </div>
          </div>
        </div>

        <div class="sectionblock">
          <h3><div class="dot"></div>상담 화법 가이드</h3>
          <div class="scripttabs">
            <button class="stab active" id="sTab1" onclick="window.setScriptTab(1, ${p.no})">공감 형성</button>
            <button class="stab" id="sTab2" onclick="window.setScriptTab(2, ${p.no})">가치 제안</button>
            <button class="stab" id="sTab3" onclick="window.setScriptTab(3, ${p.no})">클로징</button>
          </div>
          <div class="scriptbox" id="scriptContent"></div>
          <button class="copybtn" id="copyBtn" onclick="window.copyScriptData()">화법 스크립트 복사하기</button>
        </div>
      `;

      document.getElementById('detailContent').innerHTML = html;
      injectLazyPhotos();
      window.setScriptTab(1, p.no);
    }

    function injectLazyPhotos() {
      setTimeout(() => {
        const pDataEl = document.getElementById('photo-data');
        if(!pDataEl) return;
        let pMap = {};
        try { pMap = JSON.parse(pDataEl.textContent); }catch(e){}
        document.querySelectorAll('img[data-photo]').forEach(img => {
          let key = img.getAttribute('data-photo');
          if(pMap[key]) img.src = pMap[key];
        });
      }, 50);
    }

    renderFilterOptions();
    updateResults();
  })();
</script>

<!-- PWA 서비스 워커 자동 등록 스크립트 엔진 탑재 -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then((reg) => {
          console.log('서비스 워커 등록 성공:', reg.scope);
        })
        .catch((err) => {
          console.error('서비스 워커 등록 실패:', err);
        });
    });
  }
</script>
